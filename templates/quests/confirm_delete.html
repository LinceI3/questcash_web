{% extends "base.html" %}
{% block content %}

<h1 class="h4 mb-3">Eliminar reto</h1>

<p class="text-danger">
    ¿Estás seguro que deseas eliminar el reto <strong>{{ quest.nombre }}</strong>? Esta acción no se puede deshacer.
</p>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{{ url_for('detalle_quest', quest_id=quest.id) }}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
