{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center">
  <div class="qc-card p-4" style="max-width: 420px; width:100%;">

    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/QuestCash Isotipo.png') }}"
           alt="QC" style="height:70px;" class="mb-2">
      <h1 class="h4 fw-bold mb-1">Iniciar sesión</h1>
      <p class="text-muted mb-0">Bienvenido de nuevo a QuestCash .</p>
      <p class="text-muted small mb-0 mt-1">
        Revisa tus retos, tus insignias y sigue avanzando en .
      </p>
    </div>

    <form method="POST" class="needs-validation" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
        <input
          type="email"
          class="form-control qc-input-pill"
          id="correo"
          name="correo"
          placeholder="ejemplo@correo.com"
          required
        >
        <div class="invalid-feedback">
          Ingresa un correo válido.
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <input
            type="password"
            class="form-control qc-input-pill"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          >
          <button
            type="button"
            class="btn btn-outline-secondary"
            id="togglePassword"
          >
            Mostrar
          </button>
        </div>
        <div class="invalid-feedback">
          Ingresa tu contraseña aqui. 
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 qc-btn-pill fw-semibold mb-2">
        Ingresar
      </button>
    </form>

    <p class="mt-3 text-center text-muted">
      ¿No tienes cuenta?
      <a href="{{ url_for('register') }}" class="fw-semibold">Regístrate aquí</a>
    </p>

  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const pwdInput = document.getElementById("password");
    const toggleBtn = document.getElementById("togglePassword");

    if (pwdInput && toggleBtn) {
      toggleBtn.addEventListener("click", function () {
        const isPassword = pwdInput.type === "password";
        pwdInput.type = isPassword ? "text" : "password";
        this.textContent = isPassword ? "Ocultar" : "Mostrar";
      });
    }
  });
</script>

{% endblock %}
